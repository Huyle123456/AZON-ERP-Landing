<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F5E97"/>
      <stop offset="100%" stop-color="#1f3f65"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#mb-bg)"/>
  <circle cx="360" cy="50" r="70" fill="white" opacity="0.05"/>
  <circle cx="50" cy="260" r="60" fill="white" opacity="0.05"/>

  <!-- logos -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="90" height="34" rx="8" fill="white"/>
    <text x="45" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="15" fill="#2F5E97">AZON</text>
  </g>
  <text x="170" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="20" fill="white" opacity="0.7">×</text>
  <g transform="translate(190, 70)">
    <rect x="0" y="0" width="150" height="34" rx="8" fill="#e8131f"/>
    <text x="75" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="14" fill="white">MBBank</text>
  </g>

  <!-- package of money -->
  <g transform="translate(130, 145)">
    <!-- coins stack -->
    <ellipse cx="60" cy="90" rx="58" ry="12" fill="#c4931f"/>
    <rect x="2" y="72" width="116" height="18" fill="#fde68a"/>
    <ellipse cx="60" cy="72" rx="58" ry="12" fill="#fde68a"/>
    <ellipse cx="60" cy="72" rx="58" ry="12" fill="none" stroke="#c4931f" stroke-width="1.5"/>

    <rect x="10" y="54" width="100" height="18" fill="#fde68a"/>
    <ellipse cx="60" cy="54" rx="50" ry="10" fill="#fde68a"/>
    <ellipse cx="60" cy="54" rx="50" ry="10" fill="none" stroke="#c4931f" stroke-width="1.5"/>

    <rect x="22" y="38" width="76" height="16" fill="#fde68a"/>
    <ellipse cx="60" cy="38" rx="38" ry="8" fill="#fde68a"/>
    <ellipse cx="60" cy="38" rx="38" ry="8" fill="none" stroke="#c4931f" stroke-width="1.5"/>

    <text x="60" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="#c4931f">1.000 tỷ</text>
  </g>

  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="white" opacity="0.85">Gói vay tiếp sức</text>
</svg>
