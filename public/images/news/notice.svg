<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="notice-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3f65"/>
      <stop offset="100%" stop-color="#2F5E97"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#notice-bg)"/>

  <!-- decorative circles -->
  <circle cx="120" cy="120" r="160" fill="white" opacity="0.04"/>
  <circle cx="680" cy="360" r="120" fill="white" opacity="0.05"/>
  <circle cx="700" cy="60" r="40" fill="#fde68a" opacity="0.3"/>

  <!-- badge -->
  <rect x="60" y="60" width="140" height="40" rx="20" fill="#fde68a"/>
  <text x="130" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#1f3f65">THÔNG BÁO</text>

  <!-- MIỄN PHÍ headline -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-weight="900" font-size="86" fill="white">MIỄN PHÍ</text>
  <text x="60" y="250" font-family="Arial, sans-serif" font-weight="600" font-size="24" fill="#aac3e0">Hoá đơn điện tử &amp; Chữ ký số</text>
  <text x="60" y="290" font-family="Arial, sans-serif" font-weight="400" font-size="16" fill="#d5e1f0" opacity="0.85">Theo Nghị định 70/2025/NĐ-CP</text>

  <!-- invoice illustration -->
  <g transform="translate(540, 180)">
    <rect x="0" y="0" width="160" height="200" rx="12" fill="white" opacity="0.95"/>
    <rect x="20" y="24" width="80" height="8" rx="4" fill="#2F5E97"/>
    <rect x="20" y="44" width="120" height="4" rx="2" fill="#aac3e0"/>
    <rect x="20" y="56" width="100" height="4" rx="2" fill="#aac3e0"/>
    <rect x="20" y="80" width="120" height="4" rx="2" fill="#d5e1f0"/>
    <rect x="20" y="92" width="100" height="4" rx="2" fill="#d5e1f0"/>
    <rect x="20" y="104" width="110" height="4" rx="2" fill="#d5e1f0"/>
    <rect x="20" y="140" width="60" height="30" rx="4" fill="#fde68a"/>
    <circle cx="110" cy="155" r="14" fill="#2F5E97"/>
    <path d="M104,155 L109,160 L117,150" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
