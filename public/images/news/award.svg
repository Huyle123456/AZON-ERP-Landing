<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="award-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f33"/>
      <stop offset="100%" stop-color="#1f3f65"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#award-bg)"/>
  <rect width="800" height="450" fill="url(#spotlight)"/>

  <!-- sparkle stars -->
  <g fill="#fde68a" opacity="0.7">
    <circle cx="100" cy="80" r="2"/>
    <circle cx="180" cy="50" r="1.5"/>
    <circle cx="250" cy="100" r="2"/>
    <circle cx="620" cy="60" r="2"/>
    <circle cx="700" cy="100" r="1.5"/>
    <circle cx="560" cy="40" r="2"/>
    <circle cx="140" cy="380" r="2"/>
    <circle cx="680" cy="380" r="1.5"/>
  </g>

  <!-- ribbon banner -->
  <g transform="translate(400, 80)">
    <path d="M-140,0 L140,0 L130,45 L-130,45 Z" fill="#fde68a"/>
    <path d="M-140,0 L-160,30 L-140,30 Z" fill="#c4931f"/>
    <path d="M140,0 L160,30 L140,30 Z" fill="#c4931f"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#1f3f65">TOP 10</text>
  </g>

  <!-- trophy -->
  <g transform="translate(400, 260)">
    <!-- cup -->
    <path d="M-60,-80 L60,-80 L55,0 Q55,30 0,30 Q-55,30 -55,0 Z" fill="#fde68a"/>
    <path d="M-60,-80 L60,-80 L55,0 Q55,30 0,30 Q-55,30 -55,0 Z" fill="url(#trophy-shine)" opacity="0.3"/>
    <!-- handles -->
    <path d="M-60,-60 Q-95,-50 -95,-20 Q-95,0 -65,-5" fill="none" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
    <path d="M60,-60 Q95,-50 95,-20 Q95,0 65,-5" fill="none" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
    <!-- star -->
    <path d="M0,-55 L8,-35 L30,-35 L12,-22 L18,0 L0,-13 L-18,0 L-12,-22 L-30,-35 L-8,-35 Z" fill="#c4931f"/>
    <!-- stand -->
    <rect x="-15" y="30" width="30" height="20" fill="#c4931f"/>
    <rect x="-50" y="50" width="100" height="14" rx="3" fill="#c4931f"/>
  </g>

  <!-- title -->
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="white">SẢN PHẨM TIN DÙNG 2025</text>
</svg>
